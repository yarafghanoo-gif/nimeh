<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nimeh - Dating App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff4d6d, #ff8a5c);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            width: 90%;
            max-width: 350px;
            padding: 40px 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 42px;
            color: #ff4d6d;
            margin-bottom: 5px;
        }

        .tagline {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 0;
            transition: 0.3s;
        }

        .btn-google {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            background: #f8f8f8;
        }

        .btn-email {
            background: #ff4d6d;
            color: white;
        }

        .btn-email:hover {
            background: #ff3355;
        }

        .divider {
            color: #999;
            margin: 15px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #ddd;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .terms {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        .terms a {
            color: #ff4d6d;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Nimeh</h1>
        <p class="tagline">Swipe. Match. Chat.</p>
        
        <button id="btn-google" class="btn btn-google">
            <span>🇬</span> Continue with Google
        </button>
        
        <div class="divider">or</div>
        
        <button id="btn-email" class="btn btn-email">
            Sign in with email
        </button>
        
        <p class="terms">
            By continuing, you agree to our 
            <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
        </p>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAA0xYFglY_0NI-PstgS4nP3uNIpyAq0_A",
            authDomain: "nimeh-gomsodeh.firebaseapp.com",
            projectId: "nimeh-gomsodeh",
            storageBucket: "nimeh-gomsodeh.firebasestorage.app",
            messagingSenderId: "815930956932",
            appId: "1:815930956932:web:e8696a6a69b4458fd936d1"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // Google Login
        document.getElementById('btn-google').addEventListener('click', () => {
            auth.signInWithPopup(provider)
                .then(result => {
                    alert('✅ Welcome ' + result.user.displayName);
                    window.location.href = 'discover.html';
                })
                .catch(error => {
                    alert('❌ Error: ' + error.message);
                });
        });

        // Email Login (demo)
        document.getElementById('btn-email').addEventListener('click', () => {
            alert('Email login coming soon! Please use Google for now.');
        });
    </script>
</body>
</html>
