<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nimeh - Dating App</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- صفحه لاگین -->
<div id="auth-screen" class="screen active">
  <div class="auth-container">
    <h1 class="logo">Nimeh</h1>
    <p class="tagline">Swipe. Match. Chat.</p>
    <button id="google-login" class="btn btn-google">ورود با گوگل</button>
    <div class="divider">یا</div>
    <button id="show-email-form" class="btn btn-outline">ورود با ایمیل</button>
    <div id="email-form" class="email-form hidden">
      <input type="email" id="email" placeholder="ایمیل">
      <input type="password" id="password" placeholder="رمز عبور">
      <button id="email-login" class="btn btn-primary">ورود</button>
      <button id="email-signup" class="btn btn-secondary">ثبت‌نام</button>
    </div>
  </div>
</div>

<!-- صفحه اصلی اپلیکیشن -->
<div id="app-screen" class="screen">
  <div class="container">
    <!-- صفحه کشف (سوایپ) -->
    <div id="discover-view" class="view active">
      <div id="card-stack" class="card-stack"></div>
      <div id="discover-empty" class="empty-state hidden">پروفایل بیشتری وجود ندارد</div>
      <div class="action-buttons">
        <button class="action-btn skip" id="skip-btn">✕</button>
        <button class="action-btn superlike" id="superlike-btn">⭐</button>
        <button class="action-btn like" id="like-btn">❤️</button>
      </div>
    </div>

    <!-- صفحه matches -->
    <div id="matches-view" class="view">
      <h2>Matches</h2>
      <div id="matches-list" class="matches-list"></div>
      <div id="matches-empty" class="empty-state">هنوز هیچ match ای ندارید</div>
    </div>

    <!-- صفحه چت -->
    <div id="chat-view" class="view">
      <div id="chat-list" class="chat-list"></div>
      <div id="chat-room" class="chat-room hidden">
        <div class="chat-header">
          <button id="chat-back" class="back-btn">←</button>
          <span id="chat-user-name"></span>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input">
          <input type="text" id="message-input" placeholder="پیام خود را بنویسید...">
          <button id="send-btn">ارسال</button>
        </div>
      </div>
    </div>

    <!-- صفحه پروفایل -->
    <div id="profile-view" class="view">
      <div class="profile-card">
        <img id="profile-photo" class="profile-photo" src="images/default-avatar.png" alt="پروفایل">
        <h2 id="profile-name">...</h2>
        <p id="profile-age"></p>
        <p id="profile-bio"></p>
        <div id="profile-interests" class="interests"></div>
        <button id="edit-profile-btn" class="btn btn-outline">ویرایش پروفایل</button>
        <button id="logout-btn" class="btn btn-ghost">خروج</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button data-view="discover" class="nav-btn active">🔥 کشف</button>
    <button data-view="matches" class="nav-btn">💬 matches</button>
    <button data-view="chat" class="nav-btn">✉️ چت</button>
    <button data-view="profile" class="nav-btn">👤 پروفایل</button>
  </nav>
</div>

<!-- مودال ویرایش پروفایل -->
<div id="edit-modal" class="modal hidden">
  <div class="modal-content">
    <h3>ویرایش پروفایل</h3>
    <input type="text" id="edit-name" placeholder="نام">
    <input type="number" id="edit-age" placeholder="سن">
    <textarea id="edit-bio" placeholder="بیوگرافی" rows="3"></textarea>
    <input type="text" id="edit-interests" placeholder="علاقه‌مندی‌ها (با کاما جدا کنید)">
    <input type="file" id="edit-photo" accept="image/*">
    <div class="modal-buttons">
      <button id="edit-cancel" class="btn btn-ghost">انصراف</button>
      <button id="edit-save" class="btn btn-primary">ذخیره</button>
    </div>
  </div>
</div>

<!-- پاپ‌آپ match -->
<div id="match-popup" class="match-popup hidden">
  <div class="match-content">
    <h2>❤️ تبریک!</h2>
    <p>شما با <span id="match-name"></span> match شدید!</p>
    <img id="match-photo" src="" alt="">
    <button id="match-close" class="btn btn-primary">ارسال پیام</button>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
